<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webly Crafts</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Poppins", sans-serif;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  position: relative;
}


#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}


.overlay {
  position: relative;
  width: 100%;
  height: 100vh;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  z-index: 1;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 80px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.9);
}

.logo {
  width: 180px;
  border-radius: 10px;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 35px;
}

.nav-links a {
  text-decoration: none;
  color: #fff;
  font-weight: 500;
  transition: color 0.3s ease;
}

.nav-links a:hover {
  color: #00bcd4;
}
.main-content {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  padding: 30px;
  background: rgba(0, 0, 0, 0.4);
  border-radius: 20px;
}

.main-content h1 {
  font-size: 3rem;
  letter-spacing: 1px;
}

.main-content h1 span {
  color: #00bcd4;
}

.main-content p {
  font-size: 1.2rem;
  margin: 20px 0 40px;
  opacity: 0.9;
}
.btn {
  background: #00bcd4;
  color: #fff;
  padding: 12px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  transition: background 0.3s, transform 0.3s;
}

.btn:hover {
  background: #0097a7;
  transform: scale(1.05);
}
footer {
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.85);
  z-index: 2;
}
@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    padding: 20px;
  }
  .nav-links {
    flex-direction: column;
    gap: 15px;
  }
  .main-content h1 {
    font-size: 2.2rem;
  }
}
  </style>
</head>
<body>

  
  <video autoplay muted loop id="bg-video">
    <source src="background.mp4" type="video/mp4" />
  </video>

  
  <div class="overlay">

    
    <nav class="navbar">
      <img src="logo.jpg" alt="Webly Crafts Logo" class="logo">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    
    <div class="main-content">
      <h1>Welcome to <span>Webly Crafts</span></h1>
      <p>Crafting stunning websites with creativity & code.</p>
      <a href="portfolio.html" class="btn">View Portfolio</a>
    </div>

    
    <footer>
      <p>© 2026 Webly Crafts. All Rights Reserved.</p>
    </footer>

  </div>

</body>
</html>
